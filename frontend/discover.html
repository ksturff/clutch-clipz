<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ClutchClipz Discover</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial;
}

/* HEADER */
.header {
  padding: 15px;
  font-size: 20px;
  font-weight: bold;
}

/* SEARCH */
.search-container {
  padding: 10px 15px;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  font-size: 16px;
}

/* SECTION */
.section {
  padding: 10px 15px;
}

.section-title {
  margin-bottom: 10px;
  font-weight: bold;
}

/* GAME GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}

.card {
  background: #111;
  padding: 20px;
  border-radius: 10px;
  text-align: center;
  cursor: pointer;
}

/* VIDEO */
.video {
  margin-bottom: 15px;
}

video {
  width: 100%;
  border-radius: 10px;
}

/* USER */
.user {
  padding: 10px;
  background: #111;
  margin-bottom: 5px;
  border-radius: 8px;
}
</style>
</head>

<body>

<div class="header">🔍 Discover</div>

<div class="search-container">
  <input id="search" placeholder="Search games or users..." />
</div>

<div class="section">
  <div class="section-title">🎮 Categories</div>
  <div class="grid" id="games"></div>
</div>

<div class="section">
  <div class="section-title">🔥 Trending</div>
  <div id="trending"></div>
</div>

<div class="section">
  <div class="section-title">🔎 Results</div>
  <div id="results"></div>
</div>

<script>
const API = "http://localhost:5000";

/* ---------------- LOAD GAMES ---------------- */
async function loadGames() {
  const res = await fetch(API + "/games");
  const games = await res.json();

  const container = document.getElementById("games");
  container.innerHTML = "";

  games.forEach(game => {
    const div = document.createElement("div");
    div.className = "card";
    div.innerText = game;

    div.onclick = () => {
      window.location.href = "index.html?game=" + game;
    };

    container.appendChild(div);
  });
}

/* ---------------- LOAD TRENDING ---------------- */
async function loadTrending() {
  const res = await fetch(API + "/trending");
  const videos = await res.json();

  const container = document.getElementById("trending");
  container.innerHTML = "";

  videos.forEach(v => {
    const div = document.createElement("div");
    div.className = "video";

    div.innerHTML = `
      <video src="${v.url}" muted loop autoplay></video>
      <div>${v.caption}</div>
      <div>🎮 ${v.game}</div>
    `;

    container.appendChild(div);
  });
}

/* ---------------- SEARCH ---------------- */
document.getElementById("search").addEventListener("input", async (e) => {
  const q = e.target.value;

  if (!q) {
    document.getElementById("results").innerHTML = "";
    return;
  }

  const res = await fetch(API + "/search?q=" + q);
  const data = await res.json();

  const container = document.getElementById("results");
  container.innerHTML = "";

  /* VIDEO RESULTS */
  data.videos.forEach(v => {
    const div = document.createElement("div");
    div.className = "video";

    div.innerHTML = `
      <video src="${v.url}" muted loop autoplay></video>
      <div>${v.caption}</div>
      <div>🎮 ${v.game}</div>
    `;

    container.appendChild(div);
  });

  /* USER RESULTS */
  data.users.forEach(u => {
    const div = document.createElement("div");
    div.className = "user";
    div.innerText = "👤 " + u.username;

    div.onclick = () => {
      alert("Open profile: " + u.username);
    };

    container.appendChild(div);
  });
});

/* ---------------- INIT ---------------- */
loadGames();
loadTrending();
</script>

</body>
</html>
